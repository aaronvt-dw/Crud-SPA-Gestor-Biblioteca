<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Aarón</title>
    <link rel="stylesheet" href="estilos/estilo.css?v=2.0">
    <link rel="icon" type="image/png" href="imagenes/leer.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- JQuery para cargar dinámicamente -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body onload="cargarInicio()">
    <header>
        <h1><i class="fas fa-book-open fa-lg"></i> Gestor de Biblioteca Aarón</h1>
        <div class="icono" onclick="visualizoMenu()">
            <i class="fas fa-bars fa-lg"></i>
        </div>
        <div id="menu_header">
            <label class="opcion boton-interactivo" onclick="cargarInicio()">
                <i class="fas fa-home"></i> Inicio
            </label>
            <label class="opcion boton-interactivo" onclick="cargarVista('alta')">
                <i class="fas fa-plus"></i> Alta
            </label>
            <label class="opcion boton-interactivo" onclick="cargarVista('lista')">
                <i class="fas fa-list"></i> Listado
            </label>
            <label class="opcion boton-interactivo" onclick="cargarVista('consulta_baja')">
                <i class="fas fa-search"></i> Consulta/Baja
            </label>
        </div>
    </header>

    <div id="contenedor-principal">
    </div>

    <footer>
        <p> © 2026 Aarón Valcárcel Tárraga - Actividad Base de Datos</p>
    </footer>
</body>
<script>
    function cargarInicio() {
        $('#contenedor-principal').load('vistas/inicio.html');
        visualizoMenu(false);
    }

    function cargarVista(vista) {
        $('#contenedor-principal').load('vistas/' + vista + '.html');
        visualizoMenu(false);
    }

    function visualizoMenu(forzarCierre) {
        if (forzarCierre ==false) {
            document.getElementById("menu_header").classList.remove("mostrar");
        } else {
            document.getElementById("menu_header").classList.toggle("mostrar");
        }
    }
    
    let indiceActual = 0;
    function cambiarImagen(indice) {
        const imagenes = document.querySelectorAll('.carrusel .imagen');
        const puntos = document.querySelectorAll('.carrusel .punto');

        if(imagenes.length === 0) return;

        for (let i = 0; i < imagenes.length; i++) {
            imagenes[i].classList.remove('activa');
        }

        for (let i = 0; i < puntos.length; i++) {
            puntos[i].classList.remove('activo');
        }

        imagenes[indice].classList.add('activa');
        puntos[indice].classList.add('activo');

        indiceActual = indice;
    }

    function siguienteImagen() {
        const carruselExiste = document.querySelector('.carrusel');
        if(carruselExiste) {
            indiceActual = (indiceActual+1) % 3;
            cambiarImagen(indiceActual);
        }
    }
    setInterval(siguienteImagen, 4000);
</script>

</html>
